<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riptag Hivemind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 28px; }

    h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; margin-bottom: 2px; }
    .sub { font-size: 11px; color: #444; margin-bottom: 24px; }

    .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; background: #1a1a1a; color: #444; border: 1px solid #222; }
    .status-badge.on { background: #0d2b1a; color: #22cc66; border-color: #1a4a2a; }

    .btn { padding: 9px 20px; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.25; cursor: default; }
    .btn-white { background: #fff; color: #000; }
    .btn-red { background: #cc2200; color: #fff; }
    .btn-dark { background: #1e1e1e; color: #ccc; border: 1px solid #2a2a2a; }

    .layout { display: grid; grid-template-columns: 280px 1fr 220px; gap: 16px; align-items: start; }

    .card { background: #141414; border: 1px solid #1e1e1e; border-radius: 10px; padding: 18px; margin-bottom: 16px; }
    .card-title { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

    /* Settings panel */
    .setting-row { margin-bottom: 12px; }
    .setting-label { font-size: 11px; color: #777; margin-bottom: 4px; display: block; }
    input[type=number], select {
      width: 100%; background: #0d0d0d; border: 1px solid #222; color: #f0f0f0;
      border-radius: 5px; padding: 7px 9px; font-size: 12px; outline: none;
    }
    input[type=number]:focus, select:focus { border-color: #3a3a3a; }
    select option { background: #1a1a1a; }

    .custom-delays { display: none; }
    .custom-delays.show { display: block; }

    /* PC cards */
    .pc-block { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
    .pc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .pc-name-input { background: transparent; border: none; color: #fff; font-size: 13px; font-weight: 700; outline: none; width: 120px; }
    .pc-name-input:focus { border-bottom: 1px solid #444; }
    .btn-remove { background: none; border: none; color: #444; font-size: 16px; cursor: pointer; padding: 2px 6px; }
    .btn-remove:hover { color: #cc2200; }

    .group-block { margin-bottom: 8px; }
    .group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .group-label { font-size: 10px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .btn-remove-group { background: none; border: none; color: #333; font-size: 12px; cursor: pointer; }
    .btn-remove-group:hover { color: #cc2200; }

    textarea {
      width: 100%; background: #141414; border: 1px solid #222; color: #ccc;
      border-radius: 5px; padding: 8px; font-size: 11px; font-family: monospace;
      resize: vertical; outline: none; min-height: 70px;
    }
    textarea:focus { border-color: #3a3a3a; }

    .btn-add-group { background: none; border: 1px dashed #1e1e1e; color: #444; border-radius: 5px; width: 100%; padding: 6px; font-size: 11px; cursor: pointer; margin-top: 4px; }
    .btn-add-group:hover { border-color: #333; color: #777; }
    .btn-add-pc { background: #141414; color: #888; border: 1px dashed #2a2a2a; width: 100%; padding: 10px; margin-top: 4px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    .btn-add-pc:hover { border-color: #444; color: #ccc; }

    /* Status grid */
    .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    .status-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 7px; padding: 10px 12px; }
    .s-pc { font-size: 10px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .s-group { font-size: 12px; color: #ccc; margin: 3px 0; }
    .s-store { font-size: 10px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #2a2a2a; margin-right: 5px; vertical-align: middle; }
    .dot.live { background: #22cc66; box-shadow: 0 0 5px #22cc6666; }

    .save-note { font-size: 10px; color: #444; margin-top: 8px; text-align: center; }
    hr { border: none; border-top: 1px solid #1e1e1e; margin: 14px 0; }
  </style>
</head>
<body>

<h1>⬡ RIPTAG HIVEMIND</h1>
<p class="sub">Depop Auto-Engage Coordinator</p>

<div class="top-bar">
  <div class="status-badge" id="statusBadge">● IDLE</div>
  <button class="btn btn-white" id="startBtn" disabled>▶ Start All</button>
  <button class="btn btn-red" id="stopBtn" disabled>■ Stop All</button>
  <span style="font-size:11px;color:#333;margin-left:auto;" id="lastSaved"></span>
</div>

<div class="layout">

  <!-- LEFT: PC builder -->
  <div>
    <div class="card">
      <div class="card-title">PC Setup</div>
      <div id="pcList"></div>
      <button class="btn-add-pc" onclick="addPC()">+ Add PC</button>
      <hr>
      <button class="btn btn-dark" style="width:100%" onclick="saveConfig()">Save PC Config</button>
      <div class="save-note" id="pcSaveNote"></div>
    </div>
  </div>

  <!-- MIDDLE: Status -->
  <div>
    <div class="card">
      <div class="card-title">Live Status</div>
      <div class="status-grid" id="statusGrid">
        <div style="color:#333;font-size:12px;">No extensions connected yet.</div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Global settings -->
  <div>
    <div class="card">
      <div class="card-title">Global Settings</div>

      <div class="setting-row">
        <span class="setting-label">Minutes per Store</span>
        <input type="number" id="sessionMinutes" value="35" min="1" max="120">
      </div>

      <div class="setting-row">
        <span class="setting-label">Time Filter</span>
        <select id="maxDays">
          <option value="7">Last 7 Days</option>
          <option value="14">Last 14 Days</option>
          <option value="30">Last 1 Month</option>
          <option value="999">All Time</option>
        </select>
      </div>

      <div class="setting-row">
        <span class="setting-label">Max Posts per Store</span>
        <input type="number" id="maxPosts" value="30" min="1">
      </div>

      <div class="setting-row">
        <span class="setting-label">Speed Preset</span>
        <select id="speedPreset" onchange="toggleCustom()">
          <option value="stealth">Stealth (Slowest)</option>
          <option value="balanced" selected>Balanced</option>
          <option value="fast">Fast</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div class="custom-delays" id="customDelays">
        <div class="setting-row">
          <span class="setting-label">Min Delay (sec)</span>
          <input type="number" id="minDelay" value="1.5" min="0.5" step="0.5">
        </div>
        <div class="setting-row">
          <span class="setting-label">Max Delay (sec)</span>
          <input type="number" id="maxDelay" value="4" min="1" step="0.5">
        </div>
        <div class="setting-row">
          <span class="setting-label">Hesitation Chance (%)</span>
          <input type="number" id="hesitationChance" value="25" min="0" max="100" step="5">
        </div>
        <div class="setting-row">
          <span class="setting-label">Hesitation Duration (sec)</span>
          <input type="number" id="hesitationDuration" value="3" min="1" step="0.5">
        </div>
      </div>

      <button class="btn btn-dark" style="width:100%;margin-top:4px;" onclick="saveSettings()">Save Settings</button>
      <div class="save-note" id="settingsSaveNote"></div>
    </div>
  </div>

</div>

<script>
  const PRESETS = {
    stealth:  { minDelay: 3000, maxDelay: 7000, hesitationChance: 40, hesitationDuration: 4000 },
    balanced: { minDelay: 1500, maxDelay: 4000, hesitationChance: 25, hesitationDuration: 3000 },
    fast:     { minDelay: 800,  maxDelay: 2000, hesitationChance: 10, hesitationDuration: 1500 }
  };

  let pcs = {};
  let serverStatus = {};
  let isStarted = false;
  let pcCounter = 0;

  function toggleCustom() {
    const isCustom = document.getElementById('speedPreset').value === 'custom';
    document.getElementById('customDelays').className = `custom-delays${isCustom ? ' show' : ''}`;
  }

  async function saveSettings() {
    const preset = document.getElementById('speedPreset').value;
    const presetVals = preset !== 'custom' ? PRESETS[preset] : {
      minDelay: parseFloat(document.getElementById('minDelay').value) * 1000,
      maxDelay: parseFloat(document.getElementById('maxDelay').value) * 1000,
      hesitationChance: parseInt(document.getElementById('hesitationChance').value),
      hesitationDuration: parseFloat(document.getElementById('hesitationDuration').value) * 1000
    };

    const settings = {
      sessionMinutes: parseInt(document.getElementById('sessionMinutes').value),
      maxDays: parseInt(document.getElementById('maxDays').value),
      maxPosts: parseInt(document.getElementById('maxPosts').value),
      speedPreset: preset,
      ...presetVals
    };

    const res = await fetch('/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(settings)
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('settingsSaveNote').textContent = '✓ Saved';
      setTimeout(() => document.getElementById('settingsSaveNote').textContent = '', 2000);
    }
  }

  function addPC() {
    pcCounter++;
    const id = `pc${pcCounter}`;
    pcs[id] = { label: `PC ${pcCounter}`, groups: [{ queue: [] }] };
    renderPCList();
  }

  function removePC(id) { delete pcs[id]; renderPCList(); }
  function addGroup(pcId) { pcs[pcId].groups.push({ queue: [] }); renderPCList(); }
  function removeGroup(pcId, gIdx) { pcs[pcId].groups.splice(gIdx, 1); renderPCList(); }

  function renderPCList() {
    const container = document.getElementById('pcList');
    container.innerHTML = '';
    for (const [pcId, pc] of Object.entries(pcs)) {
      const block = document.createElement('div');
      block.className = 'pc-block';
      block.innerHTML = `
        <div class="pc-header">
          <input class="pc-name-input" value="${pc.label}" onchange="pcs['${pcId}'].label = this.value" />
          <button class="btn-remove" onclick="removePC('${pcId}')">✕</button>
        </div>
        <div id="groups-${pcId}"></div>
        <button class="btn-add-group" onclick="addGroup('${pcId}')">+ Add Group</button>
      `;
      container.appendChild(block);

      const groupsEl = document.getElementById(`groups-${pcId}`);
      pc.groups.forEach((group, gIdx) => {
        const gBlock = document.createElement('div');
        gBlock.className = 'group-block';
        gBlock.innerHTML = `
          <div class="group-header">
            <span class="group-label">Group ${gIdx + 1}</span>
            <button class="btn-remove-group" onclick="removeGroup('${pcId}', ${gIdx})">✕</button>
          </div>
          <textarea placeholder="https://www.depop.com/store1/&#10;https://www.depop.com/store2/"
            onchange="updateQueue('${pcId}', ${gIdx}, this.value)"
          >${group.queue.join('\n')}</textarea>
        `;
        groupsEl.appendChild(gBlock);
      });
    }
  }

  function updateQueue(pcId, gIdx, value) {
    pcs[pcId].groups[gIdx].queue = value.split('\n').map(s => s.trim()).filter(Boolean);
  }

  async function saveConfig() {
    for (const [pcId, pc] of Object.entries(pcs)) {
      pc.groups.forEach((group, gIdx) => {
        const blocks = document.querySelectorAll(`#groups-${pcId} .group-block`);
        if (blocks[gIdx]) {
          const ta = blocks[gIdx].querySelector('textarea');
          if (ta) group.queue = ta.value.split('\n').map(s => s.trim()).filter(Boolean);
        }
      });
    }
    const res = await fetch('/api/pcs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pcs })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('startBtn').disabled = false;
      document.getElementById('pcSaveNote').textContent = '✓ Saved';
      setTimeout(() => document.getElementById('pcSaveNote').textContent = '', 2000);
      const now = new Date();
      document.getElementById('lastSaved').textContent = `Last saved ${now.toLocaleTimeString()}`;
    }
  }

  document.getElementById('startBtn').onclick = async () => {
    await fetch('/api/start', { method: 'POST' });
    isStarted = true; updateBadge();
  };
  document.getElementById('stopBtn').onclick = async () => {
    await fetch('/api/stop', { method: 'POST' });
    isStarted = false; updateBadge();
  };

  function updateBadge() {
    const badge = document.getElementById('statusBadge');
    badge.textContent = isStarted ? '● RUNNING' : '● IDLE';
    badge.className = `status-badge${isStarted ? ' on' : ''}`;
    document.getElementById('startBtn').disabled = isStarted;
    document.getElementById('stopBtn').disabled = !isStarted;
  }

  function timeSince(ms) {
    const s = Math.floor((Date.now() - ms) / 1000);
    if (s < 60) return `${s}s ago`;
    return `${Math.floor(s / 60)}m ago`;
  }

  function renderStatus() {
    const grid = document.getElementById('statusGrid');
    const entries = Object.entries(serverStatus);
    if (!entries.length) {
      grid.innerHTML = '<div style="color:#333;font-size:12px;">No extensions connected yet.</div>';
      return;
    }
    grid.innerHTML = '';
    for (const [key, st] of entries) {
      const isLive = st.running && (Date.now() - st.lastSeen < 12000);
      const card = document.createElement('div');
      card.className = 'status-card';
      card.innerHTML = `
        <div class="s-pc">${key}</div>
        <div class="s-group"><span class="dot ${isLive ? 'live' : ''}"></span>${isLive ? 'Running' : 'Idle'}</div>
        <div class="s-store">${st.currentStore ? st.currentStore.replace('https://www.depop.com/', '') : '—'}</div>
        <div style="font-size:9px;color:#333;margin-top:3px;">${timeSince(st.lastSeen)}</div>
      `;
      grid.appendChild(card);
    }
  }

  function syncSettingsFromServer(settings) {
    if (!settings) return;
    document.getElementById('sessionMinutes').value = settings.sessionMinutes || 35;
    document.getElementById('maxDays').value = settings.maxDays || 7;
    document.getElementById('maxPosts').value = settings.maxPosts || 30;
    document.getElementById('speedPreset').value = settings.speedPreset || 'balanced';
    if (settings.speedPreset === 'custom') {
      document.getElementById('minDelay').value = (settings.minDelay || 1500) / 1000;
      document.getElementById('maxDelay').value = (settings.maxDelay || 4000) / 1000;
      document.getElementById('hesitationChance').value = settings.hesitationChance || 25;
      document.getElementById('hesitationDuration').value = (settings.hesitationDuration || 3000) / 1000;
    }
    toggleCustom();
  }

  async function poll() {
    try {
      const res = await fetch('/api/state');
      const data = await res.json();
      isStarted = data.started;
      serverStatus = data.status || {};

      if (!Object.keys(pcs).length && Object.keys(data.pcs || {}).length) {
        pcs = data.pcs;
        const nums = Object.keys(pcs).map(k => parseInt(k.replace('pc', ''))).filter(n => !isNaN(n));
        pcCounter = nums.length ? Math.max(...nums) : 0;
        renderPCList();
        document.getElementById('startBtn').disabled = false;
      }

      syncSettingsFromServer(data.settings);
      updateBadge();
      renderStatus();
    } catch(e) {}
  }

  poll();
  setInterval(poll, 4000);
</script>
</body>
</html>
