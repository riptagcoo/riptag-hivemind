<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riptag Hivemind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 32px; }

    h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #555; margin-bottom: 32px; }

    .grid { display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; }

    .card { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 20px; }
    .card h2 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

    textarea {
      width: 100%; height: 180px; background: #0a0a0a; border: 1px solid #2a2a2a;
      color: #f0f0f0; border-radius: 6px; padding: 10px; font-size: 12px;
      font-family: monospace; resize: vertical; outline: none;
    }
    textarea:focus { border-color: #444; }

    .btn {
      display: block; width: 100%; padding: 12px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; margin-top: 10px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-save { background: #222; color: #fff; }
    .btn-start { background: #fff; color: #000; }
    .btn-stop { background: #cc2200; color: #fff; }
    .btn:disabled { opacity: 0.3; cursor: default; }

    .store-count { font-size: 11px; color: #555; margin-top: 8px; }

    /* PC Grid */
    .pc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

    .pc-card {
      background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 8px; padding: 14px;
    }
    .pc-label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

    .group {
      background: #141414; border: 1px solid #1e1e1e; border-radius: 6px;
      padding: 8px 10px; margin-bottom: 6px;
    }
    .group-label { font-size: 10px; color: #555; margin-bottom: 4px; }
    .group-stores { font-size: 11px; color: #ccc; font-family: monospace; line-height: 1.6; }
    .group-stores .store-item { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .group-stores .store-item:first-child { color: #fff; font-weight: 600; }

    .status-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #333; margin-right: 6px; vertical-align: middle;
    }
    .status-dot.running { background: #22cc66; box-shadow: 0 0 6px #22cc6688; }
    .status-dot.idle { background: #333; }

    .group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .last-seen { font-size: 9px; color: #444; }

    .global-status {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: #141414; border: 1px solid #222; border-radius: 8px; margin-bottom: 20px;
    }
    .global-status .label { font-size: 12px; color: #666; }
    .global-status .value { font-size: 13px; font-weight: 700; }
    .value.on { color: #22cc66; }
    .value.off { color: #555; }

    .controls { display: flex; gap: 8px; margin-top: 10px; }
    .controls .btn { margin-top: 0; flex: 1; }

    hr { border: none; border-top: 1px solid #1e1e1e; margin: 14px 0; }
  </style>
</head>
<body>

  <h1>⬡ RIPTAG HIVEMIND</h1>
  <p class="subtitle">Depop Auto-Engage Coordinator</p>

  <div class="global-status">
    <span class="label">Status:</span>
    <span class="value off" id="globalStatus">IDLE</span>
    <span class="label" style="margin-left:auto;">Stores loaded:</span>
    <span class="value" id="globalStoreCount">0</span>
  </div>

  <div class="grid">

    <!-- LEFT: Store input + controls -->
    <div>
      <div class="card">
        <h2>Today's Store Queue</h2>
        <textarea id="storeInput" placeholder="https://www.depop.com/store1/&#10;https://www.depop.com/store2/&#10;https://www.depop.com/store3/"></textarea>
        <div class="store-count" id="storeCount">0 stores</div>
        <button class="btn btn-save" id="saveBtn">Save Queue</button>
        <hr>
        <div class="controls">
          <button class="btn btn-start" id="startBtn" disabled>▶ Start All</button>
          <button class="btn btn-stop" id="stopBtn" disabled>■ Stop All</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: PC status grid -->
    <div>
      <div class="card">
        <h2>PC Overview</h2>
        <div class="pc-grid" id="pcGrid">
          <!-- Generated by JS -->
        </div>
      </div>
    </div>

  </div>

  <script>
    const SERVER = ''; // Same origin — no URL needed

    const PC_CONFIG = {
      pc1: { label: 'PC 1', groups: 3 },
      pc2: { label: 'PC 2', groups: 3 },
      pc3: { label: 'PC 3', groups: 2 },
      pc4: { label: 'PC 4', groups: 2 },
      pc5: { label: 'PC 5', groups: 3 },
      pc6: { label: 'PC 6', groups: 3 }
    };

    let currentStores = [];
    let currentStatus = {};
    let isStarted = false;

    // ── Count stores as user types ──
    document.getElementById('storeInput').addEventListener('input', () => {
      const lines = getStores();
      document.getElementById('storeCount').textContent = `${lines.length} store${lines.length !== 1 ? 's' : ''}`;
    });

    function getStores() {
      return document.getElementById('storeInput').value
        .split('\n').map(s => s.trim()).filter(s => s.length > 0);
    }

    function buildQueue(stores, groupIndex) {
      if (!stores.length) return [];
      const offset = groupIndex % stores.length;
      return [...stores.slice(offset), ...stores.slice(0, offset)];
    }

    function shortenUrl(url) {
      try { return new URL(url).pathname.replace(/\/$/, '').split('/').pop(); }
      catch { return url; }
    }

    function timeSince(ms) {
      const s = Math.floor((Date.now() - ms) / 1000);
      if (s < 60) return `${s}s ago`;
      return `${Math.floor(s / 60)}m ago`;
    }

    // ── Render PC grid ──
    function renderGrid(stores, status) {
      const grid = document.getElementById('pcGrid');
      grid.innerHTML = '';

      for (const [pcId, cfg] of Object.entries(PC_CONFIG)) {
        const pcCard = document.createElement('div');
        pcCard.className = 'pc-card';
        pcCard.innerHTML = `<div class="pc-label">${cfg.label}</div>`;

        for (let g = 0; g < cfg.groups; g++) {
          const key = `${pcId}-g${g}`;
          const st = status[key];
          const isRunning = st && st.running && (Date.now() - st.lastSeen < 15000);
          const queue = buildQueue(stores, g);

          const groupEl = document.createElement('div');
          groupEl.className = 'group';

          const storeItems = queue.slice(0, 3).map((url, i) =>
            `<span class="store-item">${i === 0 ? '▶ ' : ''}${shortenUrl(url)}</span>`
          ).join('');

          groupEl.innerHTML = `
            <div class="group-header">
              <div class="group-label">
                <span class="status-dot ${isRunning ? 'running' : 'idle'}"></span>
                Group ${g + 1}
              </div>
              <div class="last-seen">${st ? timeSince(st.lastSeen) : ''}</div>
            </div>
            <div class="group-stores">
              ${stores.length ? storeItems || '<span style="color:#444">No stores</span>' : '<span style="color:#444">—</span>'}
            </div>
          `;
          pcCard.appendChild(groupEl);
        }

        grid.appendChild(pcCard);
      }
    }

    // ── Save queue ──
    document.getElementById('saveBtn').onclick = async () => {
      const stores = getStores();
      const res = await fetch('/api/stores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stores })
      });
      const data = await res.json();
      if (data.ok) {
        currentStores = stores;
        document.getElementById('startBtn').disabled = stores.length === 0;
        renderGrid(currentStores, currentStatus);
        document.getElementById('saveBtn').textContent = '✓ Saved';
        setTimeout(() => document.getElementById('saveBtn').textContent = 'Save Queue', 2000);
      }
    };

    // ── Start all ──
    document.getElementById('startBtn').onclick = async () => {
      const res = await fetch('/api/start', { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        isStarted = true;
        updateGlobalStatus();
        document.getElementById('stopBtn').disabled = false;
      }
    };

    // ── Stop all ──
    document.getElementById('stopBtn').onclick = async () => {
      await fetch('/api/stop', { method: 'POST' });
      isStarted = false;
      updateGlobalStatus();
    };

    function updateGlobalStatus() {
      const el = document.getElementById('globalStatus');
      el.textContent = isStarted ? 'RUNNING' : 'IDLE';
      el.className = `value ${isStarted ? 'on' : 'off'}`;
    }

    // ── Poll server state every 4 seconds ──
    async function poll() {
      try {
        const res = await fetch('/api/state');
        const data = await res.json();
        currentStores = data.stores;
        currentStatus = data.status;
        isStarted = data.started;

        document.getElementById('globalStoreCount').textContent = currentStores.length;
        document.getElementById('storeCount').textContent = `${currentStores.length} store${currentStores.length !== 1 ? 's' : ''}`;
        if (currentStores.length && !document.getElementById('storeInput').value.trim()) {
          document.getElementById('storeInput').value = currentStores.join('\n');
        }

        updateGlobalStatus();
        document.getElementById('startBtn').disabled = currentStores.length === 0 || isStarted;
        document.getElementById('stopBtn').disabled = !isStarted;
        renderGrid(currentStores, currentStatus);
      } catch (e) {
        console.error('Poll error:', e);
      }
    }

    poll();
    setInterval(poll, 4000);
  </script>
</body>
</html>
